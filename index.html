<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlético Iguatamense</title>
<style>
  * { box-sizing: border-box; }
  
  body, html {
    height: 100%;
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #0000FF; /* Fundo Azul */
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
  }

  /* Controle de Telas */
  .tela {
    display: none; 
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    padding: 20px;
  }

  .ativa { display: flex; }

  /* --- TELA INICIAL --- */
  .logo-principal {
    width: 180px;
    margin-bottom: 20px;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
  }

  .btn-iniciar {
    background-color: white;
    color: #0000FF;
    border: none;
    padding: 15px 40px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .btn-iniciar:hover { transform: scale(1.05); }

  /* --- TELA CARREGAMENTO --- */
  .loader {
    border: 6px solid rgba(255, 255, 255, 0.3);
    border-top: 6px solid white;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* --- TELA DE JOGOS (CARD BRANCO) --- */
  .card-jogos {
    background-color: white;
    color: #333;
    padding: 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .card-jogos h2 {
    color: #0000FF;
    margin-top: 0;
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
  }

  .linha-jogo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .linha-jogo:last-child { border-bottom: none; }

  .escudo-pequeno { width: 35px; }

  .confronto {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    font-size: 0.95rem;
  }

  .adversario {
    color: #d10000; /* Cor de destaque para o adversário */
    text-transform: uppercase;
  }

  .data-jogo {
    font-size: 0.8rem;
    color: #777;
    width: 80px;
    text-align: right;
  }

</style>
</head>
<body>

  <div id="tela1" class="tela ativa">
    <img src="https://i.postimg.cc/CMRw51k0/Clube-Atletico-Iguatamense.png" class="logo-principal">
    <h1>Atlético Iguatamense</h1>
    <button class="btn-iniciar" onclick="iniciarApp()">INICIAR</button>
  </div>

  <div id="tela2" class="tela">
    <div class="loader"></div>
    <p>Buscando partidas...</p>
  </div>

  <div id="tela3" class="tela">
    <div class="card-jogos">
      <h2>Próximos Jogos</h2>

      <div class="linha-jogo">
        <img src="https://i.postimg.cc/CMRw51k0/Clube-Atletico-Iguatamense.png" class="escudo-pequeno">
        <div class="confronto">
          <span>ATLÉTICO</span>
          <span>VS</span>
          <div class="adversario">ROLANDIA</div> </div>
        <div class="data-jogo">14/JUN</div>
      </div>

      <div class="linha-jogo">
        <img src="https://i.postimg.cc/CMRw51k0/Clube-Atletico-Iguatamense.png" class="escudo-pequeno">
        <div class="confronto">
          <span>ATLÉTICO</span>
          <span>VS</span>
          <div class="adversario">A DEFINIR</div> </div>
        <div class="data-jogo">27/JUL</div>
      </div>

      <div class="linha-jogo">
        <img src="https://i.postimg.cc/CMRw51k0/Clube-Atletico-Iguatamense.png" class="escudo-pequeno">
        <div class="confronto">
          <span>ATLÉTICO</span>
          <span>VS</span>
          <div class="adversario">Mato-Grense</div> </div>
        <div class="data-jogo">23/SET</div>
      </div>

      <div class="linha-jogo">
        <img src="https://i.postimg.cc/CMRw51k0/Clube-Atletico-Iguatamense.png" class="escudo-pequeno">
        <div class="confronto">
          <span>ATLÉTICO</span>
          <span>VS</span>
          <div class="adversario">Federação B+ F</div> </div>
        <div class="data-jogo">29/DEZ</div>
      </div>

    </div>
  </div>

  <script>
    function iniciarApp() {
      // Esconde Inicial e mostra Carregamento
      document.getElementById('tela1').classList.remove('ativa');
      document.getElementById('tela2').classList.add('ativa');

      // Espera 2 segundos e mostra os Jogos
      setTimeout(() => {
        document.getElementById('tela2').classList.remove('ativa');
        document.getElementById('tela3').classList.add('ativa');
      }, 2000);
    }
  </script>

</body>
</html>
